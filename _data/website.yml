# Book outlines
books:
  - key: c8209c92bd8e4780b61c42b0ce08b7e8
    title: "Untitled Story"
    excerpt: >- # this can be a bit longer so write it as you wish.
      An attempt for fiction writing based on the characters appearing in the comic books published by 
      Marvel and DC and a couple of more TV shows. Oh, by the way, this has vivid graphics that are darker than Nolan’s version, 
      and no one, seriously, no one wears spandex.<br><br>
      
      The story doesn’t have a beginning nor end. And, is based on Naïve Narrator’s perspective. 
      The author narrates everything as it happens when it happens.
    date_started: 2015-08-01
    genre: [Fantasy, YA]

